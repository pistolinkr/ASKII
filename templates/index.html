<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII AI - 아스키로 생각하는 AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">ASCII AI</h1>
            <p class="subtitle">아스키로 생각하는 AI - Think in ASCII</p>
        </header>
        
        <main class="main-content">
            <div class="grid">
                <!-- Image to ASCII Section -->
                <section class="section">
                    <h2 class="section-title">🖼️ 이미지를 ASCII로 변환</h2>
                    <div class="input-group">
                        <label for="imageInput">이미지 업로드:</label>
                        <input type="file" id="imageInput" accept="image/*" class="file-input">
                        <label for="imageInput" class="file-label">파일 선택</label>
                    </div>
                    <div class="input-group">
                        <label for="width">너비 (문자 수):</label>
                        <input type="number" id="width" value="80" min="20" max="200">
                    </div>
                    <div class="input-group">
                        <label for="style">스타일:</label>
                        <select id="style">
                            <option value="standard">표준</option>
                            <option value="detailed">상세</option>
                            <option value="blocks">블록</option>
                            <option value="minimal">미니멀</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="convertImage()">ASCII로 변환</button>
                    <div class="result-container">
                        <div id="imageResult" class="result" style="display: none;"></div>
                    </div>
                </section>
                
                <!-- Text to ASCII Section -->
                <section class="section">
                    <h2 class="section-title">📝 텍스트를 ASCII 아트로</h2>
                    <div class="input-group">
                        <label for="textInput">텍스트:</label>
                        <input type="text" id="textInput" placeholder="텍스트를 입력하세요..." value="ASCII AI">
                    </div>
                    <div class="input-group">
                        <label for="textStyle">스타일:</label>
                        <select id="textStyle">
                            <option value="block">블록</option>
                            <option value="banner">배너</option>
                            <option value="simple">심플</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="convertText()">ASCII 아트 생성</button>
                    <div class="result-container">
                        <div id="textResult" class="result" style="display: none;"></div>
                    </div>
                </section>
            </div>
            
            <!-- Pattern Generator Section -->
            <section class="section">
                <h2 class="section-title">🎨 ASCII 패턴 생성기</h2>
                <div class="input-group">
                    <label for="patternType">패턴 유형:</label>
                    <select id="patternType">
                        <option value="random">랜덤</option>
                        <option value="geometric">기하학적</option>
                        <option value="fractal">프랙탈</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="patternSize">크기:</label>
                    <input type="number" id="patternSize" value="20" min="10" max="50">
                </div>
                <button class="btn btn-primary" onclick="generatePattern()">패턴 생성</button>
                <div class="result-container">
                    <div id="patternResult" class="result" style="display: none;"></div>
                </div>
            </section>
            
            <!-- ASCII Analysis Section -->
            <section class="section">
                <h2 class="section-title">🔍 ASCII 분석</h2>
                <div class="input-group">
                    <label for="analyzeInput">분석할 ASCII 텍스트:</label>
                    <textarea id="analyzeInput" placeholder="ASCII 텍스트를 여기에 붙여넣으세요..."></textarea>
                </div>
                <button class="btn btn-primary" onclick="analyzeAscii()">분석하기</button>
                <div class="result-container">
                    <div id="analysisResult" class="result" style="display: none;"></div>
                    <div id="analysisStats" class="stats" style="display: none;"></div>
                </div>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
